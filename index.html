<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>송쌤과학 | 혼합물 분리 미션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Orbitron:wght@600;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c18;
  --card-bg: #111a30;
  --card-border: #1e2d50;
  --accent: #00e5ff;
  --accent2: #7c4dff;
  --accent-glow: rgba(0,229,255,0.25);
  --accent2-glow: rgba(124,77,255,0.25);
  --success: #00e676;
  --success-glow: rgba(0,230,118,0.25);
  --error: #ff1744;
  --error-glow: rgba(255,23,68,0.3);
  --warn: #ffab00;
  --warn-glow: rgba(255,171,0,0.2);
  --text: #e4e8f7;
  --text-dim: #6b7da8;
  --gold: #ffd740;
  --drop-zone: #0e1a32;
  --drop-hover: #162844;
  --scanline: rgba(0,229,255,.012);
  --title-shadow-color: var(--accent-glow);
  --card-grad1: #141e38;
  --card-grad2: #1a2848;
  --ghost-grad1: #1a2848;
  --ghost-grad2: #0e1a32;
  --capture-bg: #080c18;
}
:root.light {
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --card-border: #d0d8e8;
  --accent: #0288d1;
  --accent2: #5e35b1;
  --accent-glow: rgba(2,136,209,0.18);
  --accent2-glow: rgba(94,53,177,0.15);
  --success: #2e7d32;
  --success-glow: rgba(46,125,50,0.18);
  --error: #c62828;
  --error-glow: rgba(198,40,40,0.18);
  --warn: #e65100;
  --warn-glow: rgba(230,81,0,0.12);
  --text: #1a2030;
  --text-dim: #5a6a88;
  --gold: #e65100;
  --drop-zone: #e8eef6;
  --drop-hover: #dce4f0;
  --scanline: transparent;
  --title-shadow-color: rgba(2,136,209,0.12);
  --card-grad1: #f4f6fa;
  --card-grad2: #eaeff6;
  --ghost-grad1: #ffffff;
  --ghost-grad2: #eaeff6;
  --capture-bg: #f0f4f8;
}
:root.light body::before{background:
  radial-gradient(ellipse at 15% 10%,rgba(2,136,209,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 85% 90%,rgba(94,53,177,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 50%,rgba(46,125,50,.02) 0%,transparent 40%)}
:root.light .stage-card{box-shadow:0 2px 12px rgba(0,0,0,.06)}
:root.light .drag-card{box-shadow:0 1px 4px rgba(0,0,0,.08)}
:root.light .hud{background:rgba(255,255,255,.6);border-color:var(--card-border)}
:root.light .mission-briefing{background:linear-gradient(135deg,rgba(2,136,209,.05),rgba(94,53,177,.05));
  border-color:rgba(2,136,209,.15)}
:root.light .result-card{box-shadow:0 2px 16px rgba(0,0,0,.08)}
:root.light .countdown-number{color:var(--accent);text-shadow:none}
:root.light .countdown-text{color:var(--text);text-shadow:none}
:root.light .result-header h2{color:var(--gold);-webkit-text-fill-color:var(--gold);background:none;text-shadow:none}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 15% 10%,rgba(0,229,255,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 85% 90%,rgba(124,77,255,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 50%,rgba(0,230,118,.02) 0%,transparent 40%);
  pointer-events:none;z-index:0}

/* Scan-lines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(
  0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);
  pointer-events:none;z-index:0}

.container{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:20px 16px 50px}

/* ===== HEADER ===== */
.header{text-align:center;margin-bottom:10px;position:relative}
.header .brand{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;color:var(--accent);letter-spacing:5px;text-transform:uppercase;margin-bottom:2px;opacity:.7}
.header h1{font-family:'Black Han Sans',sans-serif;font-size:30px;color:var(--text);line-height:1.3;text-shadow:0 0 30px var(--title-shadow-color),0 0 60px rgba(0,229,255,.1)}
.header h1 .em{color:var(--accent)}
.header .subtitle{font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:1px}

/* ===== MISSION BRIEFING ===== */
.mission-briefing{background:linear-gradient(135deg,rgba(0,229,255,.06),rgba(124,77,255,.06));
  border:1px solid rgba(0,229,255,.15);border-radius:16px;padding:18px 20px;margin-bottom:16px;
  position:relative;overflow:hidden}
.mission-briefing::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:.6}
.mission-briefing .mb-label{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:800;
  color:var(--accent);letter-spacing:3px;margin-bottom:6px}
.mission-briefing .mb-text{font-size:13px;color:var(--text-dim);line-height:1.7}
.mission-briefing .mb-text strong{color:var(--text)}
.mission-briefing .mb-substances{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.mission-briefing .mb-sub{font-size:12px;padding:5px 14px;background:rgba(0,229,255,.08);
  border:1px solid rgba(0,229,255,.2);border-radius:20px;color:var(--accent);font-weight:700;
  position:relative;overflow:hidden}
.mission-briefing .mb-sub.cleared{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.2);
  color:var(--success);text-decoration:line-through;opacity:.5}
.mb-sub .pulse-ring{position:absolute;inset:-2px;border-radius:22px;border:2px solid var(--accent);
  animation:pulseRing 2s infinite;opacity:0}
@keyframes pulseRing{0%{transform:scale(1);opacity:.4}100%{transform:scale(1.3);opacity:0}}

/* ===== HUD ===== */
.hud{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
  padding:10px 16px;background:rgba(0,0,0,.3);border:1px solid var(--card-border);border-radius:14px}
.hud-left{display:flex;align-items:center;gap:12px}
.hud-timer{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:800;color:var(--accent);
  letter-spacing:2px;text-shadow:0 0 10px var(--accent-glow)}
.hud-stage{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;color:var(--text-dim);
  letter-spacing:2px}
.hud-right{display:flex;align-items:center;gap:8px}
.hud-lives{display:flex;gap:3px}
.hud-heart{font-size:16px;transition:all .3s}
.hud-heart.lost{opacity:.15;transform:scale(.8);filter:grayscale(1)}
.hud-combo{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:800;color:var(--gold);
  letter-spacing:1px;opacity:0;transition:opacity .3s}
.hud-combo.show{opacity:1}
.sound-toggle{background:none;border:1px solid var(--card-border);border-radius:8px;
  padding:4px 8px;color:var(--text-dim);font-size:14px;cursor:pointer;transition:all .2s}
.sound-toggle:hover{border-color:var(--accent);color:var(--accent)}

/* ===== PROGRESS ===== */
.progress-bar{display:flex;gap:4px;margin-bottom:16px}
.progress-step{flex:1;height:5px;border-radius:3px;background:var(--card-border);transition:all .6s;position:relative;overflow:hidden}
.progress-step.completed{background:var(--success);box-shadow:0 0 8px var(--success-glow)}
.progress-step.active{background:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.progress-step.active::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ===== STAGE CARD ===== */
.stage-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;
  padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden;
  animation:stageEnter .6s cubic-bezier(.16,1,.3,1)}
.stage-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--stage-color,var(--accent)),var(--accent2))}
.stage-card::after{content:'';position:absolute;inset:0;border-radius:20px;
  box-shadow:inset 0 0 60px rgba(0,0,0,.3);pointer-events:none}
@keyframes stageEnter{0%{opacity:0;transform:translateY(30px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}

.stage-number{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;
  color:var(--stage-color,var(--accent));letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.stage-question{font-family:'Black Han Sans',sans-serif;font-size:20px;line-height:1.4;margin-bottom:4px;
  color:var(--text)}
.stage-desc{font-size:13px;color:var(--text-dim);line-height:1.7;margin-bottom:16px}
.stage-desc strong{color:var(--text);font-weight:700}

/* ===== COUNTDOWN OVERLAY ===== */
.countdown-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:rgba(8,12,24,.92);backdrop-filter:blur(10px)}
:root.light .countdown-overlay{background:rgba(240,244,248,.92)}
.countdown-number{font-family:'Orbitron',sans-serif;font-size:100px;font-weight:900;
  color:var(--accent);text-shadow:0 0 40px var(--accent-glow),0 0 80px rgba(0,229,255,.2);
  animation:countPop .5s ease}
.countdown-text{font-family:'Black Han Sans',sans-serif;font-size:28px;color:#fff;
  text-shadow:0 0 20px var(--accent-glow);animation:countPop .5s ease}
@keyframes countPop{0%{transform:scale(2);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ===== DROP ZONES ===== */
.drop-zones{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.drop-zone-row{display:flex;align-items:center;gap:10px}
.drop-label{font-size:12px;font-weight:700;color:var(--text-dim);min-width:95px;text-align:right;flex-shrink:0}
.drop-zone{flex:1;min-height:52px;background:var(--drop-zone);border:2px dashed rgba(0,229,255,.2);
  border-radius:14px;display:flex;align-items:center;justify-content:center;padding:8px 12px;
  transition:all .25s;cursor:pointer;position:relative}
.drop-zone .placeholder{font-size:12px;color:var(--text-dim);opacity:.4}
.drop-zone.drag-over{border-color:var(--accent);border-style:solid;background:var(--drop-hover);
  box-shadow:0 0 20px var(--accent-glow);transform:scale(1.02)}
.drop-zone.correct{border-color:var(--success);border-style:solid;background:rgba(0,230,118,.06);
  box-shadow:0 0 12px var(--success-glow)}
.drop-zone.wrong{border-color:var(--error);border-style:solid;animation:shake .45s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ===== CARDS ===== */
.cards-area{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:54px;
  padding:14px;background:rgba(255,255,255,.015);border-radius:14px;border:1px solid rgba(255,255,255,.03)}
.drag-card{padding:10px 16px;background:linear-gradient(135deg,var(--card-grad1),var(--card-grad2));
  border:1.5px solid var(--card-border);border-radius:12px;font-size:13px;font-weight:700;
  color:var(--text);cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;
  transition:all .2s;white-space:nowrap;position:relative;overflow:hidden}
.drag-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,
  rgba(0,229,255,.05),transparent);opacity:0;transition:opacity .2s}
.drag-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 10px var(--accent-glow);
  transform:translateY(-3px)}
.drag-card:hover::before{opacity:1}
.drag-card:active{cursor:grabbing}
.drag-card.dragging{opacity:.3;transform:scale(.9)}
.drag-card.placed{background:linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,230,118,.03));
  border-color:rgba(0,230,118,.3);color:var(--success);pointer-events:none}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;padding:10px 16px;
  background:linear-gradient(135deg,var(--ghost-grad1),var(--ghost-grad2));border:2px solid var(--accent);
  border-radius:12px;font-size:13px;font-weight:700;color:var(--accent);
  box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 30px var(--accent-glow);
  font-family:'Noto Sans KR',sans-serif;transform:translate(-50%,-50%) scale(1.08);white-space:nowrap}

/* ===== BUTTONS ===== */
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:14px;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.btn.primary{background:linear-gradient(135deg,var(--accent),#0091ea);color:#fff;
  box-shadow:0 4px 20px var(--accent-glow);font-weight:800}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 6px 30px var(--accent-glow)}
.btn:disabled{background:var(--card-border)!important;color:var(--text-dim)!important;
  cursor:default!important;box-shadow:none!important;transform:none!important;border:none!important}
.btn.next{background:linear-gradient(135deg,var(--success),#00c853);color:#fff;
  box-shadow:0 4px 20px var(--success-glow);font-weight:800}
.btn.hint{background:transparent;border:1.5px solid var(--gold);color:var(--gold);flex:0 0 auto;padding:14px 20px}
.btn.hint:hover{background:rgba(255,215,64,.08)}

/* ===== HINT & FEEDBACK ===== */
.hint-box{margin-top:10px;padding:12px 16px;border-radius:12px;
  background:rgba(255,215,64,.06);border:1px solid rgba(255,215,64,.2);
  font-size:12px;line-height:1.7;color:var(--gold);display:none}
.hint-box.show{display:block;animation:fadeIn .3s ease}
.hint-box .hint-title{font-weight:700;margin-bottom:4px;font-size:13px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.feedback{margin-top:10px;padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.7;
  font-weight:500;display:none}
.feedback.show{display:block;animation:fadeIn .3s ease}
.feedback.correct{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);color:var(--success)}
.feedback.wrong{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.25);color:var(--error)}

/* ===== FLOATING SCORE ===== */
.float-score{position:fixed;z-index:9998;font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:24px;pointer-events:none;animation:floatUp 1s ease forwards}
.float-score.plus{color:var(--success);text-shadow:0 0 12px var(--success-glow)}
.float-score.minus{color:var(--error);text-shadow:0 0 12px var(--error-glow)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

/* ===== SCREEN FLASH ===== */
.screen-flash{position:fixed;inset:0;z-index:9997;pointer-events:none;animation:flash .3s ease forwards}
.screen-flash.green{background:rgba(0,230,118,.1)}
.screen-flash.red{background:rgba(255,23,68,.1)}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

/* ===== SEPARATION ANIMATION ===== */
.separation-anim{position:relative;margin:16px auto;width:120px;height:160px;display:none}
.separation-anim.show{display:block;animation:fadeIn .5s ease}
.beaker{width:100px;height:140px;margin:0 auto;border:3px solid rgba(0,229,255,.3);
  border-top:none;border-radius:0 0 12px 12px;position:relative;overflow:hidden;
  background:rgba(0,229,255,.03)}
.beaker-liquid{position:absolute;bottom:0;left:0;right:0;transition:height 1s ease;border-radius:0 0 9px 9px}

/* ===== COMPLETION ===== */
.completion{display:none}
.completion.show{display:block}
.result-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:24px;
  padding:28px 20px;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--success),var(--gold),#ff6d00)}
.result-header{text-align:center;margin-bottom:20px}
.result-header .trophy{font-size:56px;margin-bottom:8px}
.result-header h2{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--gold);
  text-shadow:0 0 20px var(--warn-glow);margin-bottom:4px}
.result-header .date-text{font-size:11px;color:var(--text-dim)}
.grade-section{text-align:center;margin-bottom:20px}
.grade-badge{display:inline-block;padding:8px 28px;border-radius:40px;font-size:15px;font-weight:800;letter-spacing:1px}
.grade-badge.perfect{background:linear-gradient(135deg,rgba(255,215,64,.12),rgba(255,143,0,.12));border:2px solid var(--gold);color:var(--gold)}
.grade-badge.great{background:linear-gradient(135deg,rgba(0,230,118,.12),rgba(0,200,83,.12));border:2px solid var(--success);color:var(--success)}
.grade-badge.good{background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(0,145,234,.12));border:2px solid var(--accent);color:var(--accent)}
.grade-badge.tryagain{background:linear-gradient(135deg,rgba(255,171,0,.12),rgba(239,108,0,.12));border:2px solid var(--warn);color:var(--warn)}
.grade-comment{font-size:13px;color:var(--text-dim);margin-top:8px;line-height:1.5}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat-box{background:rgba(255,255,255,.02);border:1px solid var(--card-border);border-radius:14px;padding:12px 8px;text-align:center}
.stat-box .stat-icon{font-size:20px;margin-bottom:2px}
.stat-box .stat-value{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;color:var(--accent);line-height:1.2}
.stat-box .stat-label{font-size:10px;color:var(--text-dim);margin-top:2px;font-weight:500}
.difficulty-box{background:rgba(255,171,0,.05);border:1px solid rgba(255,171,0,.18);
  border-radius:14px;padding:14px 16px;margin-bottom:20px}
.difficulty-box .diff-title{font-size:13px;font-weight:700;color:var(--warn);margin-bottom:6px}
.difficulty-box .diff-text{font-size:12px;color:var(--text-dim);line-height:1.7}
.difficulty-box .diff-text strong{color:var(--text)}
.stage-results{margin-bottom:20px}
.stage-results .sr-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.sr-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;
  margin-bottom:6px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.sr-row .sr-stage{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:800;
  letter-spacing:1px;min-width:60px;flex-shrink:0}
.sr-row .sr-content{flex:1;font-size:12px;color:var(--text-dim);line-height:1.4}
.sr-row .sr-content strong{color:var(--text);font-weight:600}
.sr-row .sr-status{font-size:18px;flex-shrink:0}
.sr-row.hard{border-color:rgba(255,171,0,.25);background:rgba(255,171,0,.03)}
.fun-facts{margin-bottom:20px}
.fun-facts .ff-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.ff-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;
  margin-bottom:4px;background:rgba(255,255,255,.02);font-size:12px;color:var(--text-dim);line-height:1.4}
.ff-item .ff-icon{font-size:18px;flex-shrink:0}
.ff-item strong{color:var(--text)}
.result-footer{text-align:center;padding-top:12px;border-top:1px solid var(--card-border)}
.result-footer .brand-mark{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;
  color:var(--accent);letter-spacing:3px;opacity:.5}
.result-footer .copyright{font-size:10px;color:var(--text-dim);margin-top:6px;opacity:.5}
.sns-links{display:flex;gap:10px;justify-content:center;margin-top:10px}
.sns-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;text-decoration:none;
  transition:all .25s;border:1px solid var(--card-border)}
.sns-btn:hover{transform:translateY(-2px)}
.sns-btn.youtube{color:#ff4444;border-color:rgba(255,68,68,.25);background:rgba(255,68,68,.06)}
.sns-btn.youtube:hover{background:rgba(255,68,68,.12);box-shadow:0 4px 16px rgba(255,68,68,.15)}

<script>
// ===== SOUND ENGINE (Web Audio API) =====
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null,soundEnabled=true;

function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();}

function playTone(freq,type,dur,vol=0.15,decay=true){
  if(!soundEnabled)return;ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  if(decay)g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function sfx(name){
  if(!soundEnabled)return;ensureAudio();
  switch(name){
    case 'pickup':
      playTone(600,'sine',.08,.12);
      setTimeout(()=>playTone(900,'sine',.06,.08),40);
      break;
    case 'drop':
      playTone(400,'sine',.1,.1);
      break;
    case 'correct':
      playTone(523,'sine',.12,.15);
      setTimeout(()=>playTone(659,'sine',.12,.15),100);
      setTimeout(()=>playTone(784,'sine',.2,.18),200);
      setTimeout(()=>playTone(1047,'sine',.3,.12),320);
      break;
    case 'wrong':
      playTone(200,'sawtooth',.15,.1);
      setTimeout(()=>playTone(160,'sawtooth',.25,.12),100);
      break;
    case 'combo':
      [523,659,784,1047,1319].forEach((f,i)=>{
        setTimeout(()=>playTone(f,'sine',.15,.1),i*60);
      });
      break;
    case 'countdown':
      playTone(440,'square',.1,.08);
      break;
    case 'go':
      playTone(880,'square',.08,.1);
      setTimeout(()=>playTone(1760,'square',.15,.08),80);
      break;
    case 'hint':
      playTone(800,'sine',.08,.06);
      setTimeout(()=>playTone(600,'sine',.1,.06),80);
      break;
    case 'stageClear':
      [523,587,659,784,880,1047].forEach((f,i)=>{
        setTimeout(()=>playTone(f,'sine',.18,.12),i*80);
      });
      break;
    case 'victory':
      const melody=[523,523,523,659,784,659,784,1047];
      melody.forEach((f,i)=>{
        setTimeout(()=>playTone(f,'sine',.22,.12),i*120);
      });
      break;
    case 'lifeLost':
      playTone(300,'sawtooth',.3,.12);
      setTimeout(()=>playTone(200,'sawtooth',.4,.1),150);
      break;
    case 'tick':
      playTone(1200,'sine',.03,.04);
      break;
  }
}

function toggleSound(){
  soundEnabled=!soundEnabled;

// ===== STATE =====
let currentStage=0,stageData=[],dragData=null,touchDragEl=null,ghostEl=null;
let timerInterval=null,startTime=0,stageStartTime=0,totalElapsed=0;
let lives=5,combo=0,score=0;

// ===== INIT =====
function init(){
  currentStage=0;lives=5;combo=0;score=0;
  stageData=STAGES.map(()=>({wrongCount:0,hintUsed:0,time:0}));
  document.getElementById('completion').classList.remove('show');
  document.getElementById('completion').innerHTML='';
  document.getElementById('hud').style.display='';
  document.getElementById('missionBriefing').style.display='';
  startTime=Date.now();stageStartTime=Date.now();
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  renderSubstances();
  renderLives();
  renderProgress();
  updateHudStage();
  showCountdown(()=>renderStage());
}

function showCountdown(cb){
  const ov=document.createElement('div');ov.className='countdown-overlay';
  document.body.appendChild(ov);
  let count=3;
  function tick(){
    if(count>0){
      ov.innerHTML='<div class="countdown-number">'+count+'</div>';
      sfx('countdown');count--;
      setTimeout(tick,700);
    }else{
      ov.innerHTML='<div class="countdown-text">미션 시작!</div>';
      sfx('go');
      setTimeout(()=>{ov.remove();cb();},600);
    }
  }
  tick();
}

function updateTimer(){
  const e=Math.floor((Date.now()-startTime)/1000);
  const m=String(Math.floor(e/60)).padStart(2,'0');
  const s=String(e%60).padStart(2,'0');
  document.getElementById('timerValue').textContent=m+':'+s;
}
function formatTime(s){return s<60?s+'초':Math.floor(s/60)+'분 '+(s%60)+'초';}

function renderSubstances(){
  const el=document.getElementById('mbSubstances');el.innerHTML='';
  ALL_SUBSTANCES.forEach(sub=>{
    const cleared=STAGES.slice(0,currentStage).some(s=>s.removed.includes(sub))||
      (currentStage>=5);
    const removed=[];
    for(let i=0;i<currentStage;i++){removed.push(STAGES[i].target);}
    const isCleared=removed.includes(sub)||currentStage>=5;
    el.innerHTML+='<span class="mb-sub'+(isCleared?' cleared':'')+'">'+escapeHTML(sub)+
      (isCleared?'':' <span class="pulse-ring"></span>')+'</span>';
  });
}

function renderLives(){
  const el=document.getElementById('hudLives');el.innerHTML='';

function showHint(){

// ===== DRAG & DROP =====
function setupDragAndDrop(){
  document.querySelectorAll('.drag-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragData=card.dataset.value;card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',card.dataset.value);
      sfx('pickup');
    });
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragData=null;});
    card.addEventListener('touchstart',handleTS,{passive:false});
    card.addEventListener('touchmove',handleTM,{passive:false});
    card.addEventListener('touchend',handleTE,{passive:false});
  });
  document.querySelectorAll('.drop-zone').forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
    zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');dropCard(zone,dragData);});
    zone.addEventListener('click',()=>{
      const p=zone.querySelector('.dropped-card');
      if(p&&!zone.classList.contains('correct')){
        const v=p.dataset.value;
        zone.innerHTML='<span class="placeholder">카드를 여기로</span>';
        document.querySelectorAll('#cardsArea .drag-card').forEach(c=>{
          if(c.dataset.value===v)c.classList.remove('placed');
        });
        updateCheckBtn();
      }
    });
  });
}

function handleTS(e){
  e.preventDefault();
  const c=e.currentTarget;if(c.classList.contains('placed'))return;
  touchDragEl=c;dragData=c.dataset.value;c.classList.add('dragging');
  sfx('pickup');
  ghostEl=document.createElement('div');ghostEl.className='drag-ghost';
  ghostEl.textContent=c.textContent;document.body.appendChild(ghostEl);
  const t=e.touches[0];ghostEl.style.left=t.clientX+'px';ghostEl.style.top=t.clientY+'px';
}
function handleTM(e){
  e.preventDefault();if(!ghostEl)return;
  const t=e.touches[0];ghostEl.style.left=t.clientX+'px';ghostEl.style.top=t.clientY+'px';
  document.querySelectorAll('.drop-zone').forEach(z=>{
    const r=z.getBoundingClientRect();
    z.classList.toggle('drag-over',t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom);
  });
}
function handleTE(e){
  e.preventDefault();if(!ghostEl)return;
  ghostEl.remove();ghostEl=null;
  if(touchDragEl)touchDragEl.classList.remove('dragging');
  const t=e.changedTouches[0];
  document.querySelectorAll('.drop-zone').forEach(z=>{
    z.classList.remove('drag-over');
    const r=z.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      dropCard(z,dragData);
    }
  });
  touchDragEl=null;dragData=null;
}

function dropCard(zone,value){
  if(!value||zone.classList.contains('correct'))return;
  sfx('drop');
  document.querySelectorAll('.drop-zone').forEach(z=>{
    if(z===zone)return;
    const existing=z.querySelector('.dropped-card');
    if(existing&&existing.dataset.value===value){
      z.innerHTML='<span class="placeholder">카드를 여기로</span>';
    }
  });
  const prev=zone.querySelector('.dropped-card');
  if(prev){
    const ov=prev.dataset.value;
    document.querySelectorAll('#cardsArea .drag-card').forEach(c=>{
      if(c.dataset.value===ov)c.classList.remove('placed');
    });
  }
  zone.innerHTML='<div class="dropped-card drag-card placed" data-value="'+escapeHTML(value)+'">'+escapeHTML(value)+'</div>';
  document.querySelectorAll('#cardsArea .drag-card').forEach(c=>{
    if(c.dataset.value===value)c.classList.add('placed');
  });
  updateCheckBtn();
}

function updateCheckBtn(){
  let ok=true;
  document.querySelectorAll('.drop-zone').forEach(z=>{
    if(!z.querySelector('.dropped-card'))ok=false;
  });
  document.getElementById('btnCheck').disabled=!ok;
}

// ===== CHECK ANSWER =====
function checkAnswer(){
  const stage=STAGES[currentStage],zones=document.querySelectorAll('.drop-zone');
  let allCorrect=true;
  zones.forEach((z,i)=>{
    const p=z.querySelector('.dropped-card');
    if(p&&p.dataset.value===stage.slots[i].answer){
      z.classList.add('correct');
    }else{
      z.classList.add('wrong');allCorrect=false;
      setTimeout(()=>z.classList.remove('wrong'),500);
    }
  });

  const fb=document.getElementById('feedback');fb.classList.add('show');

  if(allCorrect){
    stageData[currentStage].time=Math.floor((Date.now()-stageStartTime)/1000);
    combo++;
    const comboBonus=combo>=2?combo*50:0;
    const baseScore=100;
    const hintPenalty=stageData[currentStage].hintUsed*20;
    const stageScore=Math.max(0,baseScore+comboBonus-hintPenalty);
    score+=stageScore;

    sfx(combo>=3?'combo':'correct');
    screenFlash('green');
    const rect=document.getElementById('btnCheck').getBoundingClientRect();
    floatScore('+'+stageScore,true,rect.left+rect.width/2,rect.top);
    miniConfetti();
    updateCombo();

    fb.className='feedback show correct';
    fb.innerHTML='✅ <strong>분리 성공!</strong> '+stage.explanation+
      (combo>=2?'<br>🔥 <strong>COMBO x'+combo+'!</strong> 보너스 +'+comboBonus+'점':'');

    document.getElementById('hintBox').classList.remove('show');
    document.getElementById('btnHint').style.display='none';

    const btn=document.getElementById('btnCheck');
    if(currentStage<STAGES.length-1){
      btn.className='btn next';btn.textContent='다음 미션으로 →';btn.disabled=false;
      btn.onclick=nextStage;
    }else{
      btn.className='btn next';btn.textContent='미션 결과 보기 🎉';btn.disabled=false;
      btn.onclick=showCompletion;
    }
    // 스테이지 클리어 사운드 (마지막이면 안 함)
    if(currentStage<STAGES.length-1) setTimeout(()=>sfx('stageClear'),400);
  }else{
    stageData[currentStage].wrongCount++;
    combo=0;updateCombo();
    lives=Math.max(0,lives-1);
    renderLives();

    sfx('wrong');
    screenFlash('red');
    sfx('lifeLost');
    const rect=document.getElementById('btnCheck').getBoundingClientRect();
    floatScore('−50',false,rect.left+rect.width/2,rect.top);
    score=Math.max(0,score-50);

    const wc=stageData[currentStage].wrongCount;
    let msg='❌ 오답! (−50점) ';
    if(wc===1)msg+='다시 생각해 보세요!';
    else if(wc===2)msg+='힌트를 활용해 보세요! 💡';
    else msg+='힌트 버튼을 눌러 도움을 받으세요.';
    if(lives<=1)msg+='<br>⚠️ 라이프가 얼마 남지 않았습니다!';

    fb.className='feedback show wrong';fb.innerHTML=msg;

    setTimeout(()=>{
      fb.classList.remove('show');
      zones.forEach(z=>{
        if(!z.classList.contains('correct')){
          const p=z.querySelector('.dropped-card');
          if(p){
            const v=p.dataset.value;
            z.innerHTML='<span class="placeholder">카드를 여기로</span>';
            document.querySelectorAll('#cardsArea .drag-card').forEach(c=>{
              if(c.dataset.value===v)c.classList.remove('placed');
            });
          }
        }
      });
      updateCheckBtn();
    },1400);
  }
}

}

    }
    const capBg=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
    const canvas=await html2canvas(card,{backgroundColor:capBg,scale:2,useCORS:true,logging:false});
    const link=document.createElement('a');link.download='송쌤과학_혼합물분리_미션결과.png';

}

// ===== CONFETTI =====
function miniConfetti(){
  const c=['#00e5ff','#7c4dff','#ff6d00','#00e676','#ffab00','#e91e63','#ffd740'];
  for(let i=0;i<25;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=(25+Math.random()*50)+'vw';p.style.top='-10px';
    p.style.background=c[Math.floor(Math.random()*c.length)];
    p.style.animationDelay=(Math.random()*.3)+'s';
    p.style.animationDuration=(1.2+Math.random()*.8)+'s';
    document.body.appendChild(p);setTimeout(el=>el.remove(),2500,p);
  }
}
function bigConfetti(){
  const c=['#00e5ff','#7c4dff','#ff6d00','#00e676','#ffab00','#e91e63','#ffd740','#fff'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=(Math.random()*100)+'vw';p.style.top='-10px';
    p.style.width=(6+Math.random()*10)+'px';p.style.height=(6+Math.random()*10)+'px';
    p.style.background=c[Math.floor(Math.random()*c.length)];
    p.style.animationDelay=(Math.random()*1)+'s';
    p.style.animationDuration=(1.5+Math.random()*2)+'s';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(p);setTimeout(el=>el.remove(),4500,p);
  }
}

init();
</script>
</body>
</html>
